# VALIDATION SkyServe spec: single region, single replica, no overprovision.
# Purpose: prove one replica boots from the baked AMI and serves /health + a real
# request end to end, with the smallest capacity ask. Once green, use
# worker_service_fast.sky.yaml (multi-region, autoscaling, overprovision) for the event.

service:
  readiness_probe:
    path: /ready                 # 200 only when the model is loaded (not just process up)
    initial_delay_seconds: 600
  replica_policy:
    min_replicas: 1
    max_replicas: 1            # VALIDATION: one replica only
    target_qps_per_replica: 1.3
    num_overprovision: 0       # no spares; one GPU lands more reliably

resources:
  cloud: aws
  region: us-east-1
  accelerators: L40S:1
  image_id: ami-0cfa74772c613a2df   # baked: venv + checkpoint + cached weights
  disk_size: 40
  ports:
    - 7870

# Fully self-contained AMI (repo incl. /ready endpoint + venv + checkpoint +
# weights). No workdir sync: replicas have no AWS creds (auth lives only on the
# controller), so they cannot pull a workdir from S3. Re-bake to update code.
setup: |
  set -euo pipefail
  echo "Using pre-baked image; no setup needed."

run: |
  set -uo pipefail
  export PYTORCH_CUDA_ALLOC_CONF="expandable_segments:True"
  export HF_HOME="/home/ubuntu/.cache/huggingface"
  cd /home/ubuntu/cue-n-woo
  # Supervisor loop: restart the worker + re-load in place if it ever exits, so a
  # crash recovers without a full replica rebuild. /ready stays 503 until the load
  # finishes, so the LB never routes to a not-yet-warm worker.
  while true; do
    .venv/bin/python v2/llm_worker.py --host 0.0.0.0 --port 7870 --max-batch-size 64 &
    WORKER_PID=$!
    for i in $(seq 1 60); do
      curl -sf -m5 localhost:7870/health >/dev/null 2>&1 && break
      sleep 2
    done
    ( curl -s -m600 -X POST localhost:7870/load -H 'Content-Type: application/json' -d '{}' >/dev/null 2>&1 ) &
    wait $WORKER_PID
    echo "worker exited (rc=$?); restarting in 5s" >&2
    sleep 5
  done
