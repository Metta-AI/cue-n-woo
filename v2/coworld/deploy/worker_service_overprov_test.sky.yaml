# SkyServe service: autoscaling worker fleet on a PRE-BAKED ready-to-serve AMI.
#
# Identical autoscaling behavior to worker_service.sky.yaml, but each replica
# boots from an AMI that already contains the venv, the FLAS checkpoint, and the
# base Gemma-2-9b weights in the HF cache. So a new replica does NOT reinstall
# deps or re-download ~18GB from HuggingFace on every boot -- it loads the model
# from local disk. Cold start drops from ~1 hour to a couple of minutes, which is
# what makes autoscaling actually responsive.
#
# The AMI is produced from a fully-set-up worker box (see bake_ami.md).
# Update image_id below whenever the code deps or model change.
#
#   AWS_PROFILE=softmax uv run sky serve up -n cue-n-woo-workers \
#     v2/coworld/deploy/worker_service_fast.sky.yaml
#   AWS_PROFILE=softmax uv run sky serve status cue-n-woo-workers
#   AWS_PROFILE=softmax uv run sky serve down cue-n-woo-workers

service:
  readiness_probe:
    path: /ready
    # Local-disk model load only (no network download), so this is short.
    initial_delay_seconds: 300
  replica_policy:
    min_replicas: 1
    max_replicas: 16           # event ceiling; raise toward ~128 for peak
    target_qps_per_replica: 1.3
    num_overprovision: 8       # warm spares ahead of demand (clipped to max_replicas)
    upscale_delay_seconds: 120
    downscale_delay_seconds: 900

# Single-region g6e/L40S capacity is unreliable (AWS GPU demand is high and a zone
# can be dry for minutes). retry_until_up keeps trying instead of giving up, and
# any_of spreads the search across regions so a dry us-east-1 falls back to others.
# AMIs are region-scoped, so each region pins its own (identical) baked image.
resources:
  accelerators: L40S:1        # g6e.xlarge -- most price-efficient per GPU
  disk_size: 40
  ports:
    - 7870
  cloud: aws
  region: us-east-1
  image_id: ami-0cfa74772c613a2df

# No workdir: the AMI is fully self-contained (repo + venv + checkpoint + weights
# all baked at /home/ubuntu/cue-n-woo and ~/.cache/huggingface). Nothing to sync
# or install at boot -- that is what makes boots fast. Re-bake to update code/deps.
setup: |
  set -euo pipefail
  echo "Using pre-baked image; no setup needed."

run: |
  set -uo pipefail
  export PYTORCH_CUDA_ALLOC_CONF="expandable_segments:True"
  export HF_HOME="/home/ubuntu/.cache/huggingface"   # baked weights live here
  cd /home/ubuntu/cue-n-woo
  # Supervisor loop: if the worker process ever exits (crash/OOM), restart it and
  # re-load the model in place. Recovers in ~the load time instead of waiting for
  # SkyServe to fail the readiness probe and rebuild a whole replica. The run
  # command never returns, so SkyServe keeps the replica alive.
  while true; do
    .venv/bin/python v2/llm_worker.py --host 0.0.0.0 --port 7870 --max-batch-size 64 &
    WORKER_PID=$!
    for i in $(seq 1 60); do
      curl -sf -m5 localhost:7870/health >/dev/null 2>&1 && break
      sleep 2
    done
    ( curl -s -m600 -X POST localhost:7870/load -H 'Content-Type: application/json' -d '{}' >/dev/null 2>&1 ) &
    wait $WORKER_PID
    echo "worker exited (rc=$?); restarting in 5s" >&2
    sleep 5
  done
