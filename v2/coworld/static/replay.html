<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cue 'n' Woo — Replay</title>
<style>
:root{
  --bg:#0e1116;--panel:#171b22;--card:#1d222b;--line:#2a313c;--line2:#3a434f;
  --ink:#e8ecf1;--muted:#9aa6b2;--dim:#6b7785;--mono:ui-monospace,SFMono-Regular,Menlo,monospace;
  --a:#54b9ff;--a-bg:#13344d;--b:#ffb454;--b-bg:#4a3411;--good:#46d27f;--bad:#ff6b6b;--warn:#ffce54;
}
*{box-sizing:border-box}
body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;margin:0;background:var(--bg);color:var(--ink);font-size:20px;height:100vh;overflow:hidden}
.wrap{max-width:1400px;width:100%;height:100vh;margin:0 auto;padding:14px 16px 100px;display:flex;flex-direction:column;min-height:0}
#stage{flex:1;min-height:0;display:flex;flex-direction:column}
.bolt{color:var(--warn)}
.pip{width:11px;height:11px;border-radius:50%;display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.blink{animation:pulse 1.2s ease-in-out infinite}
.sub{font-size:18px;color:var(--muted)}
.introview,.promptview,.duelview,.finalview{flex:1;min-height:0;display:flex;flex-direction:column}
.duelview{overflow:hidden}
.judge{display:flex;align-items:center;gap:16px;padding:14px 18px;background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-top:0}
.javatar{width:64px;height:64px;border-radius:50%;background:#2b2350;color:#cdb8ff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:22px;flex-shrink:0}
.jlabel{font-size:17px;font-weight:600;color:var(--ink)}
.concept{font-size:22px;font-weight:600;color:#d9c6ff}
.prompt{font-size:21px;color:var(--muted);text-align:center;padding:18px;background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-top:14px;line-height:1.5}
.intro{flex:1;min-height:0;display:flex;align-items:center;justify-content:center}
.prompt b{color:var(--ink);font-weight:600}
.questionbox{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-top:14px;padding:14px 18px;text-align:center}
.context{font-size:17px;color:var(--muted);margin-bottom:6px}
.duelq{font-size:26px;line-height:1.32;font-weight:650;color:var(--ink)}
.qa{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:24px;margin-top:14px;flex:1;min-height:0;overflow:auto}
.qahead{display:flex;align-items:center;gap:12px;font-size:21px;font-weight:600;margin-bottom:18px}
.qa .label{font-size:15px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:6px}
.qtext,.rtext{font-size:24px;line-height:1.5}
.rtext{color:var(--ink)}
.qtext{color:var(--muted);margin-bottom:22px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:14px;flex:1;min-height:130px}
@media(max-width:640px){.cards{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px 24px;opacity:0;transform:translateY(8px);transition:opacity .4s,transform .4s,border-color .3s;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.card.in{opacity:1;transform:none}
.card.win{border-color:var(--good)}
.chead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.who{display:flex;align-items:center;gap:12px;font-size:21px;font-weight:600;min-width:0}
.dot{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;flex-shrink:0}
.dotA{background:var(--a-bg);color:var(--a)}.dotB{background:var(--b-bg);color:var(--b)}
.ans{font-size:26px;line-height:1.42;min-height:0;flex:1;overflow:auto}
.badge{font-size:17px;opacity:0;transition:opacity .3s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.badgeA{color:var(--a)}.badgeB{color:var(--b)}
.tag{font-size:15px;color:var(--muted);margin-top:14px}
.tag b{color:var(--ink);font-weight:600}
.meter{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 18px;margin-top:14px;flex-shrink:0}
.mstatus{display:flex;align-items:center;justify-content:space-between;gap:16px;font-size:17px;color:var(--muted);margin-bottom:10px}
.mstatus span:first-child{display:block;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.delta{font-family:var(--mono);font-size:17px;color:var(--dim);white-space:nowrap}
.pcts{display:flex;justify-content:space-between;font-size:18px;font-weight:600;margin-bottom:7px}
.pa{color:var(--a)}.pb{color:var(--b)}
.bar{height:18px;border-radius:9px;overflow:hidden;background:var(--line);display:flex}
.barA{background:var(--a);transition:width .2s linear}.barB{flex:1;background:var(--b)}
.names{display:flex;justify-content:space-between;font-size:14px;color:var(--dim);margin-top:6px}
.score{display:flex;justify-content:center;gap:28px;font-size:17px;margin-top:12px;color:var(--muted);flex-wrap:wrap}
.score b{font-weight:600}.sa{color:var(--a)}.sb{color:var(--b)}
.bar-controls{position:fixed;left:0;right:0;bottom:0;background:rgba(14,17,22,.94);border-top:1px solid var(--line);backdrop-filter:blur(6px)}
.ctrls{max-width:1400px;width:92vw;margin:0 auto;padding:16px 24px;display:flex;align-items:center;gap:18px}
button{font:inherit;font-size:19px;background:var(--card);color:var(--ink);border:1px solid var(--line2);border-radius:10px;padding:12px 20px;cursor:pointer;white-space:nowrap}
button:hover{border-color:var(--a)}
button:disabled{opacity:.4;cursor:default}
.prog{flex:1;height:8px;background:var(--line);border-radius:4px;overflow:hidden;min-width:48px}
.progfill{height:100%;width:0;background:var(--a);transition:width .3s}
.spd{font-size:19px;color:var(--muted);min-width:42px;text-align:center}
.final{text-align:center;padding:30px;margin-top:14px;background:var(--panel);border:1px solid var(--line);border-radius:14px;flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.final h2{margin:0 0 10px;font-size:38px}
.crown{color:var(--warn)}
.err{color:var(--bad);padding:32px;text-align:center;font-size:22px}
.hint,.rawrow{display:none}
.rawrow{text-align:center;margin-top:10px}
a.raw{color:var(--dim);font-size:17px;text-decoration:none}
@media(max-width:720px),(max-height:760px){
  body{font-size:16px}
  .wrap{width:100%;padding:8px 8px 68px}
  .pip{width:8px;height:8px}
  .sub{font-size:11px;text-align:right}
  .judge{gap:8px;padding:7px 8px}
  .javatar{width:28px;height:28px;font-size:12px}
  .jlabel{font-size:11px}
  .concept{font-size:12px}
  .prompt{font-size:13px;line-height:1.3;padding:8px 10px;margin-top:8px;border-radius:8px}
  .questionbox{padding:10px;margin-top:8px}
  .context{font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
  .duelq{font-size:22px;line-height:1.25}
  .qa{padding:13px 14px;margin-top:8px;border-radius:8px}
  .qahead{font-size:14px;gap:8px;margin-bottom:10px}
  .qa .label{font-size:11px;margin-bottom:4px}
  .qtext,.rtext{font-size:20px}
  .cards{gap:9px;margin-top:9px;min-height:118px}
  .card{padding:13px 14px;border-radius:8px}
  .chead{margin-bottom:8px}
  .who{gap:8px;font-size:14px}
  .dot{width:28px;height:28px;font-size:12px}
  .ans{font-size:24px;line-height:1.32}
  .badge,.tag{font-size:12px}
  .tag{margin-top:8px}
  .meter{padding:9px 10px;margin-top:9px;border-radius:8px}
  .mstatus{display:block}
  .delta{display:block;margin-top:3px}
  .pcts{font-size:14px;margin-bottom:5px}
  .bar{height:14px;border-radius:7px}
  .names{font-size:11px;margin-top:5px}
  .score{font-size:13px;gap:16px;margin-top:9px}
  .ctrls{width:100%;padding:8px 10px;gap:7px}
  button{font-size:12px;padding:7px 8px}
  .prog{height:6px;border-radius:3px}
  .spd{font-size:12px;min-width:28px}
}
@media(max-height:700px){
  .wrap{padding-top:8px;padding-bottom:68px}
  .judge{padding:6px 8px}
  .javatar{width:24px;height:24px}
  .prompt,.questionbox,.qa,.cards,.meter,.score{margin-top:7px}
  .duelq{font-size:21px}
  .ans{font-size:23px}
  .qtext,.rtext{font-size:19px}
  .ctrls{padding-top:6px;padding-bottom:6px}
}
@media(max-width:640px){
  .cards{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="wrap">
  <a class="raw" href="replay/raw" hidden>view raw json</a>
  <div id="stage"></div>
</div>
<div class="bar-controls"><div class="ctrls">
  <button id="btnPlay">&#9654; Play</button>
  <button id="btnPrev">&#9664; Prev</button>
  <button id="btnNext">Next &#9654;</button>
  <div class="prog"><div class="progfill" id="progfill"></div></div>
  <span class="spd" id="spdlbl">1&times;</span>
  <button id="btnSpd">Speed</button>
</div></div>
<script>
(function(){
  var stage=document.getElementById('stage');
  var btnPlay=document.getElementById('btnPlay'),btnPrev=document.getElementById('btnPrev'),btnNext=document.getElementById('btnNext'),btnSpd=document.getElementById('btnSpd');
  var progfill=document.getElementById('progfill'),spdlbl=document.getElementById('spdlbl');
  function esc(s){var d=document.createElement('div');d.textContent=(s==null?'':String(s));return d.innerHTML;}

  function conceptText(c){
    if(!c) return null;
    if(c.type==='text' && c.text) return c.text;
    if(c.type==='random') return 'a mystery vector (seed '+esc(c.seed)+')';
    return null;
  }

  // Display slot A = player 0, B = player 1. Each scored row is a duel between the
  // question author's own answer and the opponent's answer to that question.
  function buildShow(replay){
    // Player names come over the wire in config_public.players; fall back to
    // generic slot labels only if the config omits them.
    var cfg=replay.config_public||{}, players=(cfg.players||[]);
    var nameA=(players[0]&&players[0].name)||'Player 1', nameB=(players[1]&&players[1].name)||'Player 2';
    var results=replay.results||{}, rows=results.rows||[], replayPlayers=replay.players||[];
    var concept=conceptText(replay.hidden_concept||results.hidden_concept);
    var prompts=[];
    [0,1].forEach(function(slot){
      var turns=((replayPlayers[slot]||{}).judge||[]);
      turns.forEach(function(turn,i){
        prompts.push({
          side: slot===0?'A':'B',
          name: slot===0?nameA:nameB,
          index: i+1,
          question: turn.question,
          answer: turn.answer
        });
      });
    });
    var duels=rows.map(function(r){
      var authorIsA = r.submitter===0;
      // "secret" side is the question's author; "opponent" is the other player.
      // Map every per-side field (answer, probability, and the points breakdown)
      // onto fixed A/B slots so the UI never has to know who authored the round.
      function side(secretVal, opponentVal){ return authorIsA ? secretVal : opponentVal; }
      return {
        author: authorIsA?'A':'B',
        question: r.question,
        ansA: authorIsA ? r.secret_answer : r.opponent_answer,
        ansB: authorIsA ? r.opponent_answer : r.secret_answer,
        probA: side(r.average_secret_probability, r.average_opponent_probability),
        probB: side(r.average_opponent_probability, r.average_secret_probability),
        ptsA: side(r.secret_score_points, r.opponent_score_points),
        ptsB: side(r.opponent_score_points, r.secret_score_points),
        baseA: side(r.secret_base_points, r.opponent_base_points),
        baseB: side(r.opponent_base_points, r.secret_base_points),
        bonusA: side(r.secret_bonus_points, r.opponent_bonus_points)||0,
        bonusB: side(r.opponent_bonus_points, r.secret_bonus_points)||0,
        penA: side(r.secret_duplicate_penalty_points, r.opponent_duplicate_penalty_points)||0,
        penB: side(r.opponent_duplicate_penalty_points, r.secret_duplicate_penalty_points)||0,
        missA: side(!!r.secret_missing, !!r.opponent_missing),
        missB: side(!!r.opponent_missing, !!r.secret_missing),
        noContest: !!r.no_contest,
        duplicate: !!r.duplicate_conflict
      };
    });
    return {nameA:nameA,nameB:nameB,concept:concept,prompts:prompts,duels:duels,scores:results.scores||[0,0],status:results.status,timeout:results.timeout};
  }

  var show=null, idx=0, playing=false, speed=1, timer=null;
  // steps: 0 = intro/judge, private prompts, challenge duels, final
  function totalSteps(){ return show ? show.prompts.length+show.duels.length+2 : 0; }
  function promptCount(){ return show ? show.prompts.length : 0; }
  function firstDuelStep(){ return promptCount()+1; }
  function lastDuelStep(){ return promptCount()+show.duels.length; }
  function currentDuelNumber(){ return idx-firstDuelStep()+1; }
  // Base playback runs at 1/2.5 of the original pace; the speed buttons scale relative to that.
  function anim(ms){ return ms*2.5/speed; }
  function hold(ms){ return ms/speed; }

  function render(){
    if(!show) return;
    progfill.style.width = (totalSteps()<=1?0:(idx/(totalSteps()-1))*100)+'%';
    btnPrev.disabled = idx<=0; btnNext.disabled = idx>=totalSteps()-1;
    if(idx===0) renderIntro();
    else if(idx<=promptCount()) renderPrompt(show.prompts[idx-1]);
    else if(idx<=lastDuelStep()) renderDuel(show.duels[currentDuelNumber()-1]);
    else renderFinal();
  }

  // The judge card stays on screen through every phase (intro, each duel, final)
  // so the secret style the judge is channeling is always visible.
  function judgeCard(){
    return '<div class="judge"><div class="javatar">J</div><div>'+
        '<div class="jlabel">Judge &middot; presiding</div>'+
        '<div class="concept">secretly channeling: '+(show.concept?esc(show.concept):'&lt;hidden&gt;')+'</div>'+
      '</div></div>';
  }

  function renderIntro(){
    stage.innerHTML =
      '<div class="introview">'+
      judgeCard()+
      '<div class="prompt intro">A theory-of-mind duel: <b>'+esc(show.nameA)+'</b> vs <b>'+esc(show.nameB)+'</b> &mdash; '+show.duels.length+' challenge rounds after private judge interviews.</div>'+
      '</div>';
  }

  function renderPrompt(p){
    stage.innerHTML =
      '<div class="promptview">'+
      judgeCard()+
      '<div class="qa">'+
        '<div class="qahead"><div class="dot dot'+p.side+'">'+esc(p.name.charAt(0).toUpperCase())+'</div>'+
          esc(p.name)+' <span class="sub">private prompt '+p.index+'</span></div>'+
        '<div class="label">Prompt</div><div class="qtext">&ldquo;'+esc(p.question)+'&rdquo;</div>'+
        '<div class="label">Judge response</div><div class="rtext">&ldquo;'+esc(p.answer)+'&rdquo;</div>'+
      '</div>'+
      '</div>';
    if(playing) scheduleNext(hold(2000));
  }

  function renderDuel(d){
    var authorName = d.author==='A'?show.nameA:show.nameB;
    var roundNumber=currentDuelNumber();
    stage.innerHTML =
      '<div class="duelview">'+
      judgeCard()+
      '<div class="questionbox"><div class="context">Round '+roundNumber+' &middot; question by '+esc(authorName)+'</div><div class="duelq">'+esc(d.question)+'</div></div>'+
      '<div class="cards">'+card('A',show.nameA,d.ansA)+card('B',show.nameB,d.ansB)+'</div>'+
      meter(d)+scoreboard()+
      '</div>';
    requestAnimationFrame(function(){
      var cA=document.getElementById('cardA'); if(cA) cA.classList.add('in');
      var cB=document.getElementById('cardB'); if(cB) cB.classList.add('in');
      judgeTimers.push(setTimeout(function(){
        judge(d);
      }, anim(420)));
    });
  }
  function card(side,name,ans){
    var missing=!ans;
    return '<div class="card" id="card'+side+'">'+
      '<div class="chead"><div class="who"><div class="dot dot'+side+'">'+esc(name.charAt(0).toUpperCase())+'</div>'+esc(name)+'</div>'+
      '<span class="badge badge'+side+'" id="badge'+side+'">&#127942; judge’s pick</span></div>'+
      '<div class="ans">'+(missing?'<span style="color:var(--dim)">&lt;empty&gt;</span>':'&ldquo;'+esc(ans)+'&rdquo;')+'</div>'+
      '<div class="tag" id="tag'+side+'"></div></div>';
  }
  function meter(d){
    // Disqualified/no-contest rounds aren't judged, so start with honest static
    // values instead of the "sampling logits" jitter and a 50/50 split.
    var dq = d && (d.noContest || d.missA || d.missB);
    var status = dq
      ? '<span style="color:var(--dim)">not judged &mdash; disqualified round</span>'
      : '<span class="pip blink" style="background:var(--muted);margin-right:5px"></span>judge is reading &mdash; sampling logits&hellip;';
    var startA = dq ? (d.noContest ? 0 : (d.missA?0:100)) : 50;
    var startB = dq ? (d.noContest ? 0 : (d.missA?100:0)) : 50;
    return '<div class="meter">'+
      '<div class="mstatus"><span id="mstat">'+status+'</span><span class="delta" id="delta">&Delta;logit —</span></div>'+
      '<div class="pcts"><span class="pa" id="pctA">'+startA+'%</span><span class="pb" id="pctB">'+startB+'%</span></div>'+
      '<div class="bar"><div class="barA" id="barA" style="width:'+Math.max(2,Math.min(98,startA))+'%"></div><div class="barB" id="barB"></div></div>'+
      '<div class="names"><span>'+esc(show.nameA)+'</span><span>'+esc(show.nameB)+'</span></div></div>';
  }
  function scoreboard(){
    return '<div class="score"><span>scoreboard</span>'+
      '<span class="sa">'+esc(show.nameA)+' <b id="sA">'+fmt(runningScore('A'))+'</b></span>'+
      '<span class="sb">'+esc(show.nameB)+' <b id="sB">'+fmt(runningScore('B'))+'</b></span></div>';
  }
  // Score *entering* the current round: sum only rounds strictly before this one
  // (duels[0..idx-2]). The current round's points are added live in reveal(), so
  // they must NOT be in this baseline or they would be counted twice.
  function runningScore(side){
    var s=0, last=Math.max(0, Math.min(currentDuelNumber()-1, show.duels.length));
    for(var i=0;i<last;i++){ s += (side==='A'?show.duels[i].ptsA:show.duels[i].ptsB)||0; } return s;
  }
  function fmt(n){ return (Math.round((n||0)*10)/10).toString(); }

  function setBar(p){
    // p is the TRUE percentage for A. The labels must report it faithfully — a
    // real 0% has to read 0%, never a clamped 2%. The clamp applies only to the
    // bar's pixel width so a sliver of each color stays visible.
    var w=Math.max(2,Math.min(98,p));
    var barA=document.getElementById('barA'); if(!barA) return;
    barA.style.width=w.toFixed(1)+'%';
    document.getElementById('pctA').textContent=Math.round(p)+'%';
    document.getElementById('pctB').textContent=(100-Math.round(p))+'%';
    var d=Math.log(w/(100-w)); document.getElementById('delta').textContent='Δlogit '+(d>=0?'+':'')+d.toFixed(2);
  }

  var judgeTimers=[];
  function clearJudge(){ judgeTimers.forEach(function(t){clearInterval(t);clearTimeout(t);}); judgeTimers=[]; }
  function judge(d){
    clearJudge();
    // Disqualified rounds were never scored by the judge — no softmax was sampled.
    // Don't fake the "sampling logits" jitter; snap the bar straight to the hard
    // outcome instead of animating a verdict that never happened.
    if(d.noContest){
      // Neither side answered: not a probability split at all. Both read 0%.
      var pA=document.getElementById('pctA'), pB=document.getElementById('pctB');
      if(pA) pA.textContent='0%'; if(pB) pB.textContent='0%';
      var bA=document.getElementById('barA'); if(bA) bA.style.width='0%';
      var dl=document.getElementById('delta'); if(dl) dl.textContent='Δlogit —';
      reveal(d,50);
      return;
    }
    if(d.missA || d.missB){
      setBar(d.missA?0:100);   // disqualified side reads a true 0%
      reveal(d, d.missA?0:100);
      return;
    }
    var tot=(d.probA||0)+(d.probB||0);
    var targetA = tot>0 ? (d.probA/tot)*100 : 50;
    var t=0, jit=setInterval(function(){ t++; setBar(50+Math.sin(t/2)*16+(Math.random()*8-4)); }, anim(140));
    judgeTimers.push(jit);
    judgeTimers.push(setTimeout(function(){
      clearInterval(jit);
      var barA=document.getElementById('barA'); var cur=barA?parseFloat(barA.style.width)||50:50;
      var st=setInterval(function(){
        cur+=(targetA-cur)*0.18;
        if(Math.abs(targetA-cur)<0.4){ cur=targetA; clearInterval(st); reveal(d,targetA); }
        setBar(cur);
      }, anim(55));
      judgeTimers.push(st);
    }, anim(d.duplicate?300:800)));
  }
  // Spell out how a side's round points are built: probability base, then either
  // the +10 "beat the opponent" bonus or the -10 duplicate-answer penalty. A side
  // that didn't answer scores a flat 0 and is labelled as a non-answer.
  function pointsBreakdown(side,d){
    var miss=(side==='A'?d.missA:d.missB);
    if(miss) return '<b>0 pts</b> &middot; <span style="color:var(--dim)">no answer</span>';
    var base=(side==='A'?d.baseA:d.baseB)||0;
    var bonus=(side==='A'?d.bonusA:d.bonusB)||0;
    var pen=(side==='A'?d.penA:d.penB)||0;
    var oppMiss=(side==='A'?d.missB:d.missA);
    var total=(side==='A'?d.ptsA:d.ptsB)||0;
    var parts=['<b>'+fmt(total)+' pts</b>', fmt(base)+' base'];
    if(bonus>0) parts.push('<span style="color:var(--good)">+'+fmt(bonus)+(oppMiss?' uncontested bonus':' beat bonus')+'</span>');
    if(pen<0) parts.push('<span style="color:var(--bad)">'+fmt(pen)+' duplicate penalty</span>');
    return parts.join(' &middot; ');
  }
  function reveal(d,targetA){
    var mstat=document.getElementById('mstat'); if(!mstat) return;
    if(d.noContest){
      mstat.innerHTML='<span style="color:var(--dim)">&#9888; neither side answered &mdash; no contest, 0 points</span>';
    } else if(d.missA||d.missB){
      var realWin=d.missA?'B':'A', rname=realWin==='A'?show.nameA:show.nameB;
      mstat.innerHTML='<span style="color:var(--good)">&#10003; '+esc(rname)+' answered unopposed &mdash; the other side was empty</span>';
      var rc=document.getElementById('card'+realWin), rb=document.getElementById('badge'+realWin);
      if(rc) rc.classList.add('win'); if(rb) rb.style.opacity='1';
    } else if(d.duplicate){
      mstat.innerHTML='<span style="color:var(--warn)">&#9888; both answers matched &mdash; shared base, each &minus;10 duplicate penalty</span>';
    } else if(Math.abs(targetA-50)<0.5){
      mstat.innerHTML='<span style="color:var(--muted)">dead heat &mdash; no beat bonus</span>';
    } else {
      var win=targetA>50?'A':'B', name=win==='A'?show.nameA:show.nameB;
      mstat.innerHTML='<span style="color:var(--good)">&#10003; the Judge leans '+esc(name)+' &mdash; +10 beat bonus</span>';
      var card=document.getElementById('card'+win), badge=document.getElementById('badge'+win);
      if(card) card.classList.add('win'); if(badge) badge.style.opacity='1';
    }
    var tA=document.getElementById('tagA'), tB=document.getElementById('tagB');
    if(tA) tA.innerHTML=pointsBreakdown('A',d); if(tB) tB.innerHTML=pointsBreakdown('B',d);
    var sA=document.getElementById('sA'), sB=document.getElementById('sB');
    if(sA) sA.textContent=fmt(runningScore('A')+(d.ptsA||0));
    if(sB) sB.textContent=fmt(runningScore('B')+(d.ptsB||0));
    if(playing) scheduleNext(anim(1600));
  }

  function renderFinal(){
    clearJudge();
    var a=show.scores[0]||0, b=show.scores[1]||0;
    var winner = a===b?null:(a>b?show.nameA:show.nameB);
    stage.innerHTML=
      '<div class="finalview">'+
      judgeCard()+
      '<div class="final">'+
      (winner?'<h2><span class="crown">&#128081;</span> '+esc(winner)+' wins</h2>':'<h2>It’s a tie</h2>')+
      '<div class="sub">'+esc(show.nameA)+' '+fmt(a)+' &middot; '+esc(show.nameB)+' '+fmt(b)+'</div>'+
      (show.timeout?'<div class="sub" style="color:var(--warn);margin-top:8px">&#9888; round ended on the clock</div>':'')+
    '</div></div>';
  }

  function scheduleNext(ms){ clearTimeout(timer); timer=setTimeout(function(){ if(playing) step(1); }, ms); }
  function step(dir){
    clearJudge(); clearTimeout(timer);
    var next=idx+dir;
    if(playing && next>=totalSteps()) next=0;
    idx=Math.max(0,Math.min(totalSteps()-1, next));
    render();
    if(playing && idx===0) scheduleNext(anim(2600));
    else if(playing && idx>=totalSteps()-1) scheduleNext(anim(2600));
  }
  btnNext.onclick=function(){ playing=false; btnPlay.innerHTML='&#9654; Play'; step(1); };
  btnPrev.onclick=function(){ playing=false; btnPlay.innerHTML='&#9654; Play'; step(-1); };
  function startPlayback(){
    playing=true; btnPlay.innerHTML='&#10073;&#10073; Pause';
    if(idx>=totalSteps()-1) idx=0;
    render();
    if(idx===0) scheduleNext(anim(2400));
  }
  btnPlay.onclick=function(){
    if(playing){ playing=false; btnPlay.innerHTML='&#9654; Play'; clearJudge(); clearTimeout(timer); }
    else { startPlayback(); }
  };
  var speeds=[1,1.5,2,0.5];
  btnSpd.onclick=function(){ speed=speeds[(speeds.indexOf(speed)+1)%speeds.length]; spdlbl.innerHTML=speed+'&times;'; };

  function websocketUrl(path){
    var target=new URL(location.href);
    target.protocol=target.protocol==='https:'?'wss:':'ws:';
    target.pathname=target.pathname.replace(/\/client\/replay(?:\/.*)?$/,path);
    target.search=''; target.hash='';
    return target.toString();
  }
  var ws=new WebSocket(websocketUrl('/replay'));
  ws.onmessage=function(e){
    var msg=JSON.parse(e.data);
    if(msg.type==='error'){ stage.innerHTML='<div class="err">'+esc(msg.error)+'</div>'; return; }
    if(msg.type==='replay'){
      show=buildShow(msg.replay);
      if(!show.duels.length){ stage.innerHTML='<div class="err">This replay has no scored rounds to show.</div>'; return; }
      idx=0; render();
      startPlayback();   // autoplay once the replay loads
    }
  };
  ws.onerror=function(){ stage.innerHTML='<div class="err">Could not load replay stream.</div>'; };
})();
</script>
</body>
</html>
